# Qwen3.5-9B baseline experiment
experiment_name: "qwen3_5_9b"
model_config: "models/qwen3_5_9b.yaml"
prompt_config: "prompts/baseline.yaml"

data:
  data_dir: "data/processed/mimic_iv_bhc"
  ranges: ["0_1k", "1k_2k", "2k_4k"]
  sample_size: 500
  sample_seed: 42

generation:
  save_every: 10

output:
  dir: "outputs/baseline/qwen3_5_9b/"
  predictions_file: "predictions.jsonl"
